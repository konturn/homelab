# NUT UPS monitor configuration
# Monitors the UPS and triggers shutdown when battery is critical

# Monitor: UPS name @ localhost, power value 1, user, password, type
MONITOR cyberpower@localhost 1 upsmon {{ vault_nut_monitor_password }} primary

# Minimum battery charge (%) before shutdown
MINSUPPLIES 1

# Shutdown command — executed when battery is critical
SHUTDOWNCMD "/sbin/shutdown -h +0 \"UPS battery critical\""

# Notification flags: WALL = broadcast, EXEC = run NOTIFYCMD
NOTIFYFLAG ONLINE    SYSLOG+WALL+EXEC
NOTIFYFLAG ONBATT    SYSLOG+WALL+EXEC
NOTIFYFLAG LOWBATT   SYSLOG+WALL+EXEC
NOTIFYFLAG FSD       SYSLOG+WALL+EXEC
NOTIFYFLAG SHUTDOWN  SYSLOG+WALL+EXEC
NOTIFYFLAG REPLBATT  SYSLOG+WALL+EXEC

# Custom notification messages
NOTIFYMSG ONLINE    "UPS %s is on line power"
NOTIFYMSG ONBATT    "UPS %s is on battery!"
NOTIFYMSG LOWBATT   "UPS %s battery is LOW — shutdown imminent!"
NOTIFYMSG FSD       "UPS %s: forced shutdown in progress"
NOTIFYMSG SHUTDOWN  "System shutting down due to UPS"
NOTIFYMSG REPLBATT  "UPS %s battery needs replacement"

# Run this command on any notification
NOTIFYCMD /etc/nut/notify.sh

# Seconds between UPS polls
POLLFREQ 5

# Seconds between UPS polls when on battery
POLLFREQALERT 5

# Seconds without contact before declaring UPS dead
DEADTIME 15

# Wait for drivers to connect on startup
MAXSTARTDELAY 0
