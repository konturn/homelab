# NUT UPS driver configuration
# CyberPower UPS via SNMP (network card)
#
# Reference: https://networkupstools.org/docs/man/snmp-ups.html

maxretry = 3

[cyberpower]
    driver = snmp-ups
    port = ups.lab.nkontur.com
    desc = "CyberPower UPS"

    # SNMPv3 authentication (matches existing Telegraf config)
    snmp_version = v3
    secLevel = authPriv
    secName = apc1
    authProtocol = MD5
    authPassword = {{ vault_snmp_password }}
    privProtocol = AES
    privPassword = {{ vault_snmp_password }}

    # CyberPower-specific MIB
    mibs = cyberpower

    # Poll interval for full updates (seconds)
    pollfreq = 30
