services:
  promtail:
    image: grafana/promtail:3.6.7@sha256:51346af8682f7a664affaca4f34a62f5a4f0f83ace9931df94590375a94ff8f1
    container_name: promtail
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    volumes:
      - /var/log:/var/log:ro
      - /etc/machine-id:/etc/machine-id:ro
      - promtail-positions:/tmp/positions
      - {{ docker_persistent_data_path }}/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    network_mode: host
    mem_limit: 64m
    cpus: 0.15
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Telegraf runs on baremetal (systemd service), not as a container.
  # Hardware monitoring (SMART, IPMI, sensors, systemd) requires host access.
  # See ansible/roles/configure-homelab-services/ for baremetal telegraf config.

volumes:
  promtail-positions:
    name: promtail-positions
