extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

receivers:
  # ============================================================================
  # OTLP — Traces, metrics, logs from instrumented applications
  # ============================================================================
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  # Add resource attributes for easier filtering in Grafana
  resource:
    attributes:
      - key: deployment.environment
        value: homelab
        action: upsert

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  influxdb:
    endpoint: "http://{{ influxdb_ip }}:8086"
    org: "homelab"
    bucket: "metrics"
    token: "{{ vault_influxdb_telegraf_token }}"

  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [influxdb]

    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]

  telemetry:
    logs:
      level: info
    metrics:
      address: "0.0.0.0:8888"
