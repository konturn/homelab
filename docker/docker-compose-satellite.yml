networks:
  zwave:
services:
  nginx: 
    image: nginx:latest@sha256:bc45d248c4e1d1709321de61566eb2b64d4f0e32765239d66573666be7f13349
    container_name: nginx
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/cache/nginx
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - zwave
    ports:
      - '80:80'
      - '443:443'
    restart: unless-stopped
    volumes:
      - {{ docker_persistent_data_path }}/nginx/conf/conf.d:/etc/nginx/conf.d
      - {{ docker_persistent_data_path }}/nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - {{ docker_persistent_data_path }}/nginx/conf/ssl_config:/etc/nginx/ssl_config
      - {{ docker_persistent_data_path }}/nginx/log:/data/log
      - {{ docker_persistent_data_path }}/certs:/data/certs/nkontur.com/certificates
    healthcheck:
      test: ["CMD-SHELL", "pgrep nginx > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
