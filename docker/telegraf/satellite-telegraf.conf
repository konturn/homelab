[global_tags]
  host = "{{ inventory_hostname | regex_replace('\\.lab\\.nkontur\\.com$', '') }}"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  flush_jitter = "2s"
  hostname = ""

[[inputs.cpu]]
    percpu = true
    totalcpu = true
    collect_cpu_time = false
    report_active = true
[[inputs.disk]]
    ignore_fs = ["tmpfs", "devtmpfs", "devfs"]
[[inputs.diskio]]
  # Exclude SD card block devices — not accessible from inside the container
  devices = ["sd*", "nvme*", "vd*"]
[[inputs.mem]]
[[inputs.net]]
  # nstat plugin replaces protocol stats (deprecated in 1.27.3)
  ignore_protocol_stats = true
[[inputs.system]]
[[inputs.swap]]
[[inputs.netstat]]
[[inputs.processes]]
[[inputs.kernel]]

# Docker container stats
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  docker_label_include = []
  docker_label_exclude = []
  perdevice_include = ["cpu", "blkio", "network"]

# Temperature sensors (Pi has thermal_zone)
[[inputs.temp]]

[[outputs.influxdb_v2]]
  urls = ["http://{{ influxdb_iot_ip }}:8086"]
  token = "{{ vault_influxdb_telegraf_token | default(lookup('env', 'INFLUXDB_TELEGRAF_TOKEN')) }}"
  organization = "homelab"
  bucket = "metrics"
