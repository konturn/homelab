# ============================================================================
# Agent — Global settings
# ============================================================================
[agent]
  hostname = "{{ inventory_hostname | regex_replace('\\.lab\\.nkontur\\.com$', '') }}"
  omit_hostname = false

# ============================================================================
# Docker — Container stats via socket
# ============================================================================
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"

  gather_services = false

  container_name_include = []
  container_name_exclude = []

  timeout = "5s"

  docker_label_include = []
  docker_label_exclude = []

  perdevice_include = ["cpu", "blkio", "network"]

# ============================================================================
# UPS SNMP monitoring (CyberPower via {{ ups_address }})
# ============================================================================
[[inputs.snmp]]
  agents = ["udp://{{ ups_address }}:161"]
  interval = "30s"
  timeout = "5s"
  version = 3
  community = "public"
  agent_host_tag = "source"
  retries = 3
  sec_name = "apc1"
  auth_protocol = "MD5"
  auth_password = "{{ vault_snmp_password | default(lookup('env', 'SNMP_PASSWORD')) }}"
  sec_level = "authPriv"
  priv_protocol = "AES"
  priv_password = "{{ vault_snmp_password | default(lookup('env', 'SNMP_PASSWORD')) }}"
  [[inputs.snmp.field]]
    oid = "UPS-MIB::upsOutputCurrent.1"
    name = "consumption"
  [[inputs.snmp.field]]
    oid = "UPS-MIB::upsBatteryTemperature.0"
    name = "temperature"
  [[inputs.snmp.field]]
    oid = "UPS-MIB::upsOutputPercentLoad.1"
    name = "load"
  [[inputs.snmp.field]]
    oid = "UPS-MIB::upsOutputVoltage.1"
    name = "voltage"
  [[inputs.snmp.field]]
    oid = "UPS-MIB::upsEstimatedMinutesRemaining.0"
    name = "minutes"
  [[inputs.snmp.field]]
    oid = "UPS-MIB::upsEstimatedChargeRemaining.0"
    name = "percent_charge"
  [[inputs.snmp.field]]
    oid = "UPS-MIB::upsBatteryStatus.0"
    name = "status"
  [[inputs.snmp.field]]
    oid = "UPS-MIB::upsSecondsOnBattery.0"
    name = "batterySeconds"

# ============================================================================
# Aruba S2500-48P — SNMP monitoring
# SNMPv2c with community "public" (configured in networking/switches/aruba-config)
# Switch IP: 10.100.0.1 on dedicated /24 (router at 10.100.0.2)
# ============================================================================

# --- System-level metrics (scalar fields) ---
[[inputs.snmp]]
  agents = ["udp://10.100.0.1:161"]
  interval = "60s"
  timeout = "10s"
  version = 2
  community = "public"
  agent_host_tag = "source"
  retries = 2
  name = "aruba_system"

  [inputs.snmp.tags]
    device_type = "switch"

  # System info
  [[inputs.snmp.field]]
    oid = "SNMPv2-MIB::sysName.0"
    name = "hostname"
    is_tag = true
  [[inputs.snmp.field]]
    oid = "SNMPv2-MIB::sysUpTime.0"
    name = "uptime"
  [[inputs.snmp.field]]
    oid = "SNMPv2-MIB::sysDescr.0"
    name = "description"

  # Memory (Aruba enterprise MIB: wlsxSysExtMemory)
  # .2 = total KB, .3 = free KB, .4 = used KB
  [[inputs.snmp.field]]
    oid = "1.3.6.1.4.1.14823.2.2.1.1.1.11.1.2.1"
    name = "memory_total_kb"
  [[inputs.snmp.field]]
    oid = "1.3.6.1.4.1.14823.2.2.1.1.1.11.1.3.1"
    name = "memory_free_kb"
  [[inputs.snmp.field]]
    oid = "1.3.6.1.4.1.14823.2.2.1.1.1.11.1.4.1"
    name = "memory_used_kb"

# --- CPU utilization (Aruba enterprise MIB: wlsxSysExtProcessorTable) ---
[[inputs.snmp]]
  agents = ["udp://10.100.0.1:161"]
  interval = "60s"
  timeout = "10s"
  version = 2
  community = "public"
  agent_host_tag = "source"
  retries = 2
  name = "aruba_cpu"

  [inputs.snmp.tags]
    device_type = "switch"

  [[inputs.snmp.table]]
    name = "aruba_cpu"
    # .2 = CPU name, .3 = CPU utilization %
    [[inputs.snmp.table.field]]
      oid = "1.3.6.1.4.1.14823.2.2.1.1.1.9.1.2"
      name = "cpu_name"
      is_tag = true
    [[inputs.snmp.table.field]]
      oid = "1.3.6.1.4.1.14823.2.2.1.1.1.9.1.3"
      name = "cpu_utilization"

# --- Interface table (IF-MIB) — per-port traffic, errors, status ---
[[inputs.snmp]]
  agents = ["udp://10.100.0.1:161"]
  interval = "60s"
  timeout = "10s"
  version = 2
  community = "public"
  agent_host_tag = "source"
  retries = 2
  name = "aruba_interface"

  [inputs.snmp.tags]
    device_type = "switch"

  [[inputs.snmp.table]]
    name = "aruba_interface"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifDescr"
      name = "interface"
      is_tag = true
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOperStatus"
      name = "oper_status"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifAdminStatus"
      name = "admin_status"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCInOctets"
      name = "in_octets"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCOutOctets"
      name = "out_octets"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInErrors"
      name = "in_errors"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutErrors"
      name = "out_errors"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInDiscards"
      name = "in_discards"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutDiscards"
      name = "out_discards"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCInUcastPkts"
      name = "in_unicast_pkts"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCOutUcastPkts"
      name = "out_unicast_pkts"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCInBroadcastPkts"
      name = "in_broadcast_pkts"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCOutBroadcastPkts"
      name = "out_broadcast_pkts"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCInMulticastPkts"
      name = "in_multicast_pkts"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCOutMulticastPkts"
      name = "out_multicast_pkts"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHighSpeed"
      name = "speed_mbps"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifType"
      name = "type"

# ============================================================================
# IPMI — Server hardware sensors via BMC
# ============================================================================
[[inputs.ipmi_sensor]]
  path = "/usr/bin/ipmitool"
  servers = ["ADMIN:{{ vault_ipmi_password | default(lookup('env', 'IPMI_PASSWORD')) }}@lan(ipmi.lab.nkontur.com)"]
  interval = "30s"
  timeout = "20s"

# ============================================================================
# Host metrics — CPU, disk, memory, network, processes
# ============================================================================
[[inputs.cpu]]
    percpu = true
    totalcpu = true
    collect_cpu_time = false
    report_active = true
[[inputs.disk]]
    ignore_fs = ["tmpfs", "devtmpfs", "devfs"]
[[inputs.diskio]]
[[inputs.mem]]
[[inputs.net]]
[[inputs.system]]
[[inputs.swap]]
[[inputs.netstat]]
[[inputs.processes]]
[[inputs.kernel]]

# ============================================================================
# Ping — Network reachability
# ============================================================================
[[inputs.ping]]
  # Use exec method (system ping binary has setuid) instead of native
  # which requires CAP_NET_RAW on the telegraf binary
  method = "exec"
  interval = "5s"
  urls = ["1.1.1.1", "8.8.8.8", "10.3.0.1"]
  count = 4
  ping_interval = 1.0
  timeout = 2.0

# ============================================================================
# SMART Disk Health — Predict failures before they happen
# ============================================================================
[[inputs.smart]]
  path_smartctl = "/usr/sbin/smartctl"
  path_nvme = "/usr/sbin/nvme"
  attributes = true
  interval = "5m"

# ============================================================================
# Hardware Sensors — Temps, fans, voltages (requires lm-sensors)
# ============================================================================
[[inputs.sensors]]

# ============================================================================
# Nginx — Request rates and connection stats via stub_status
# ============================================================================
[[inputs.nginx]]
  urls = ["http://{{ lab_nginx_ip }}/stub_status"]
  interval = "30s"
  response_timeout = "5s"
  [inputs.nginx.tags]
    nginx_instance = "lab"

[[inputs.nginx]]
  urls = ["http://{{ nginx_ip }}/stub_status"]
  interval = "30s"
  response_timeout = "5s"
  [inputs.nginx.tags]
    nginx_instance = "external"

[[inputs.nginx]]
  urls = ["http://{{ iot_nginx_ip }}/stub_status"]
  interval = "30s"
  response_timeout = "5s"
  [inputs.nginx.tags]
    nginx_instance = "iot"

# ============================================================================
# GitLab Prometheus Metrics — Scrape /-/metrics endpoint
# ============================================================================
[[inputs.prometheus]]
  urls = ["https://gitlab.lab.nkontur.com/-/metrics"]
  tls_ca = "/etc/ssl/certs/ca-certificates.crt"
  metric_version = 2
  interval = "60s"
  namepass = ["sidekiq_*", "puma_*", "gitaly_*", "gitlab_sql_*", "gitlab_cache_*", "gitlab_transaction_*", "ruby_*", "gitlab_workhorse_*"]

# ============================================================================
# DNS Health — Verify DNS resolution is working
# ============================================================================
[[inputs.dns_query]]
  servers = ["{{ pihole_ip }}"]
  domains = ["google.com", "cloudflare.com", "github.com"]
  record_type = "A"
  timeout = "5s"
  interval = "60s"

# ============================================================================
# Systemd Services — Track service status
# ============================================================================
[[inputs.systemd_units]]
  unittype = "service"
  pattern = "docker* ssh* telegraf* nginx*"
  timeout = "5s"

# ============================================================================
# Pi-hole — DNS query stats (v6 API with token auth)
# ============================================================================
[[inputs.exec]]
  commands = ["/etc/telegraf/scripts/pihole-stats.sh"]
  timeout = "10s"
  data_format = "influx"
  interval = "30s"
  environment = [
    "PIHOLE_URL=http://{{ pihole_ip }}",
    "PIHOLE_API_TOKEN={{ vault_pihole_api_token | default(lookup('env', 'PIHOLE_API_TOKEN')) }}"
  ]

# ============================================================================
# Sonarr — Queue depth and system status
# ============================================================================
[[inputs.http]]
  urls = ["https://sonarr.lab.nkontur.com/api/v3/queue?apikey={{ vault_sonarr_api_key | default(lookup('env', 'SONARR_API_KEY')) }}"]
  method = "GET"
  interval = "5m"
  timeout = "10s"
  insecure_skip_verify = true
  data_format = "json_v2"
  name_override = "sonarr_queue"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.field]]
      path = "totalRecords"
      rename = "total_records"
      type = "int"

[[inputs.http]]
  urls = ["https://sonarr.lab.nkontur.com/api/v3/wanted/missing?apikey={{ vault_sonarr_api_key | default(lookup('env', 'SONARR_API_KEY')) }}&pageSize=1"]
  method = "GET"
  interval = "5m"
  timeout = "10s"
  insecure_skip_verify = true
  data_format = "json_v2"
  name_override = "sonarr_missing"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.field]]
      path = "totalRecords"
      rename = "total_records"
      type = "int"

[[inputs.http]]
  urls = ["https://sonarr.lab.nkontur.com/api/v3/system/status?apikey={{ vault_sonarr_api_key | default(lookup('env', 'SONARR_API_KEY')) }}"]
  method = "GET"
  interval = "5m"
  timeout = "10s"
  insecure_skip_verify = true
  data_format = "json_v2"
  name_override = "sonarr_status"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.field]]
      path = "version"
      type = "string"

# ============================================================================
# Radarr — Queue depth and system status
# ============================================================================
[[inputs.http]]
  urls = ["https://radarr.lab.nkontur.com/api/v3/queue?apikey={{ vault_radarr_api_key | default(lookup('env', 'RADARR_API_KEY')) }}"]
  method = "GET"
  interval = "5m"
  timeout = "10s"
  insecure_skip_verify = true
  data_format = "json_v2"
  name_override = "radarr_queue"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.field]]
      path = "totalRecords"
      rename = "total_records"
      type = "int"

[[inputs.http]]
  urls = ["https://radarr.lab.nkontur.com/api/v3/wanted/missing?apikey={{ vault_radarr_api_key | default(lookup('env', 'RADARR_API_KEY')) }}&pageSize=1"]
  method = "GET"
  interval = "5m"
  timeout = "10s"
  insecure_skip_verify = true
  data_format = "json_v2"
  name_override = "radarr_missing"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.field]]
      path = "totalRecords"
      rename = "total_records"
      type = "int"

[[inputs.http]]
  urls = ["https://radarr.lab.nkontur.com/api/v3/system/status?apikey={{ vault_radarr_api_key | default(lookup('env', 'RADARR_API_KEY')) }}"]
  method = "GET"
  interval = "5m"
  timeout = "10s"
  insecure_skip_verify = true
  data_format = "json_v2"
  name_override = "radarr_status"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.field]]
      path = "version"
      type = "string"

# ============================================================================
# NZBGet — Download speed and queue stats via JSON-RPC
# ============================================================================
[[inputs.http]]
  urls = ["https://{{ vault_nzbget_username | default(lookup('env', 'NZBGET_USERNAME')) }}:{{ vault_nzbget_password | default(lookup('env', 'NZBGET_PASSWORD')) }}@nzbget.lab.nkontur.com/jsonrpc/status"]
  insecure_skip_verify = true
  method = "GET"
  interval = "30s"
  timeout = "5s"
  data_format = "json_v2"
  name_override = "nzbget"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.object]]
      path = "result"
      disable_prepend_keys = true
    [[inputs.http.json_v2.field]]
      path = "result.DownloadRate"
      rename = "download_rate"
      type = "int"
    [[inputs.http.json_v2.field]]
      path = "result.RemainingSizeMB"
      rename = "remaining_size_mb"
      type = "int"
    [[inputs.http.json_v2.field]]
      path = "result.DownloadedSizeMB"
      rename = "downloaded_size_mb"
      type = "int"
    [[inputs.http.json_v2.field]]
      path = "result.ServerPaused"
      rename = "server_paused"
      type = "boolean"
    [[inputs.http.json_v2.field]]
      path = "result.PostJobCount"
      rename = "post_job_count"
      type = "int"

# ============================================================================
# Deluge — Download/upload speed and torrent queue via web API
# ============================================================================
[[inputs.exec]]
  commands = ["/etc/telegraf/scripts/deluge-stats.sh"]
  timeout = "10s"
  data_format = "influx"
  interval = "30s"
  environment = [
    "DELUGE_PASSWORD={{ vault_deluge_password | default(lookup('env', 'DELUGE_PASSWORD')) }}",
    "DELUGE_HOST={{ deluge_ip }}"
  ]

# ============================================================================
# Plex/Tautulli — Active streams and transcode stats
# ============================================================================
{% if vault_tautulli_api_key is defined and vault_tautulli_api_key %}
[[inputs.http]]
  urls = ["https://tautulli.lab.nkontur.com/api/v2?apikey={{ vault_tautulli_api_key }}&cmd=get_activity"]
  method = "GET"
  interval = "30s"
  timeout = "5s"
  data_format = "json_v2"
  name_override = "tautulli_activity"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.field]]
      path = "response.data.stream_count"
      rename = "stream_count"
      type = "int"
    [[inputs.http.json_v2.field]]
      path = "response.data.stream_count_transcode"
      rename = "transcode_count"
      type = "int"
    [[inputs.http.json_v2.field]]
      path = "response.data.stream_count_direct_play"
      rename = "direct_play_count"
      type = "int"
    [[inputs.http.json_v2.field]]
      path = "response.data.stream_count_direct_stream"
      rename = "direct_stream_count"
      type = "int"
    [[inputs.http.json_v2.field]]
      path = "response.data.total_bandwidth"
      rename = "total_bandwidth"
      type = "int"
{% endif %}

# ============================================================================
# Vault — Seal status and health
# ============================================================================
[[inputs.http]]
  urls = ["https://{{ vault_ip }}:8200/v1/sys/health"]
  method = "GET"
  interval = "30s"
  timeout = "5s"
  insecure_skip_verify = true
  success_status_codes = [200, 429, 472, 473, 501, 503]
  data_format = "json_v2"
  name_override = "vault_health"
  [[inputs.http.json_v2]]
    [[inputs.http.json_v2.field]]
      path = "sealed"
      type = "boolean"
    [[inputs.http.json_v2.field]]
      path = "initialized"
      type = "boolean"
    [[inputs.http.json_v2.field]]
      path = "standby"
      type = "boolean"
    [[inputs.http.json_v2.field]]
      path = "server_time_utc"
      type = "int"
    [[inputs.http.json_v2.field]]
      path = "version"
      type = "string"

# ============================================================================
# TLS Certificate Expiry — monitor internal service certs
# ============================================================================
[[inputs.x509_cert]]
  sources = [
    "https://grafana.lab.nkontur.com:443",
    "https://gitlab.lab.nkontur.com:443",
    "https://nextcloud.nkontur.com:443",
    "https://plex.nkontur.com:443",
  ]
  interval = "6h"
  timeout = "10s"
  insecure_skip_verify = true

# ============================================================================
# Output — InfluxDB v2
# ============================================================================
[[outputs.influxdb_v2]]
  urls = ["http://{{ influxdb_ip }}:8086"]
  token = "{{ vault_influxdb_telegraf_token | default(lookup('env', 'INFLUXDB_TELEGRAF_TOKEN')) }}"
  organization = "homelab"
  bucket = "metrics"
