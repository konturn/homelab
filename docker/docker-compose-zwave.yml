services:
  zwavejs2mqtt:
    container_name: zwavejs2mqtt
    image: zwavejs/zwave-js-ui:11.14@sha256:d8d9fec2d5c03cb073f31469c11fd1728d93057ebee7b59d5b3995e61aa29791
    restart: unless-stopped
    tty: true
    stop_signal: SIGINT
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    environment:
      - HTTPS=false
      - ZWAVEJS_EXTERNAL_CONFIG=/usr/src/app/store/.config-db
      # Uncomment if you want logs time and dates to match your timezone instead of UTC
      # Available at https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      - TZ=America/New_York
    networks:
      - zwave
    devices:
      # Do not use /dev/ttyUSBX serial devices, as those mappings can change over time.
      # Instead, use the /dev/serial/by-id/X serial device for your Z-Wave stick.
      - '/dev/serial/by-id/usb-Silicon_Labs_Zooz_ZST10_700_Z-Wave_Stick_0001-if00-port0:/dev/zwave'
    volumes:
      - zwave-config:/usr/src/app/store
    ports:
      - '{{ zwave_address }}:8091:8091' # port for web interface
      - '{{ zwave_address }}:3000:3000' # port for Z-Wave JS websocket server
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8091"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
networks:
  zwave:
volumes:
  zwave-config:
    name: zwave-config
