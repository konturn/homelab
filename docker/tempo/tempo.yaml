stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

# Disable usage reporting — Tempo runs on an internal-only bridge network
# (loki-backend) with no external DNS, causing repeated lookup failures
# for stats.grafana.org that pollute container logs.
usage_report:
  reporting_enabled: false

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 336h   # 14 days

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write: []

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
